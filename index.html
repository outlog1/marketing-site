<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Outlog</title>
  <meta name="description" content="Stop running your guide business from a group text. Outlog handles your schedule, your clients, and your follow-up. Early access opening to 10 guides this season." />

  <meta property="og:title" content="Outlog" />
  <meta property="og:description" content="Stop running your guide business from a group text." />
  <meta property="og:url" content="https://getoutlog.com" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://getoutlog.com/hero.jpg" />
  <meta name="theme-color" content="#F0EDE6" />

  <link rel="icon" type="image/svg+xml" href="/outlog-mark.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --teal: #0A6E5A;
      --teal-hover: #085A4A;
      --mist: #E8F4F0;
      --near-black: #1A1A18;
      --stone: #F0EDE6;
      --gray-line: rgba(26, 26, 24, 0.14);
      --gray-muted: rgba(26, 26, 24, 0.6);
    }

    *,
    *::before,
    *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--stone);
      color: var(--near-black);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 17px;
      font-weight: 400;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    .page {
      max-width: 580px;
      margin: 0 auto;
      padding: 1.75rem 1.25rem 2rem;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header { padding-bottom: 2.5rem; }

    .lockup {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .wordmark {
      font-family: 'Barlow', sans-serif;
      font-weight: 600;
      font-size: 22px;
      letter-spacing: 0.02em;
      color: var(--near-black);
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    h1 {
      font-family: 'Barlow', sans-serif;
      font-weight: 600;
      font-size: 36px;
      line-height: 1.1;
      letter-spacing: -0.01em;
      margin-bottom: 1.25rem;
    }

    .lede {
      font-size: 19px;
      line-height: 1.5;
      margin-bottom: 0.75rem;
    }

    .meta {
      font-size: 16px;
      line-height: 1.55;
      color: var(--gray-muted);
      margin-bottom: 2rem;
    }

    /* === Hero image ===
       Save the photo as `hero.jpg` in this folder. The framing below
       uses object-position to keep the two figures roughly centered
       across mobile and desktop crops. */
    .hero {
      width: 100%;
      aspect-ratio: 4 / 5;
      margin: 0 0 2.5rem;
      border-radius: 12px;
      overflow: hidden;
      background: rgba(26, 26, 24, 0.05);
      position: relative;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 42%;
      display: block;
    }

    /* Soft fade at the bottom of the photo into the stone background —
       keeps it from looking like a hard-cut sticker. Very subtle. */
    .hero::after {
      content: "";
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 18%;
      background: linear-gradient(to bottom, rgba(240, 237, 230, 0) 0%, rgba(240, 237, 230, 0.55) 100%);
      pointer-events: none;
    }

    @media (min-width: 600px) {
      .hero { aspect-ratio: 5 / 4; }
    }

    /* === Form === */
    .label {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 0.625rem;
    }

    .form-block {
      margin-bottom: 1.5rem;
    }

    .field-label {
      display: block;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--near-black);
      margin-bottom: 0.625rem;
    }

    .field-label .field-helper {
      font-weight: 400;
      color: var(--gray-muted);
    }

    .role-group {
      border: none;
      padding: 0;
      margin: 0 0 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .role-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      min-height: 56px;
      border: 0.5px solid var(--gray-line);
      border-radius: 8px;
      background: white;
      cursor: pointer;
      transition: border-color 0.12s, background-color 0.12s;
      user-select: none;
    }

    .role-option:hover { border-color: rgba(10, 110, 90, 0.4); }

    .role-option input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--teal);
      cursor: pointer;
      flex: 0 0 auto;
    }

    .role-option span {
      font-size: 16px;
      font-weight: 500;
      line-height: 1.3;
    }

    .role-option:has(input:checked) {
      border-color: var(--teal);
      background: var(--mist);
    }

    .form {
      display: flex;
      gap: 8px;
      margin-bottom: 0.5rem;
    }

    .form input[type="email"] {
      flex: 1;
      min-width: 0;
      height: 52px;
      padding: 0 16px;
      border: 0.5px solid var(--gray-line);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 400;
      color: var(--near-black);
      background: white;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .form input[type="email"]::placeholder { color: rgba(26, 26, 24, 0.4); }

    .form input[type="email"]:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 2px rgba(10, 110, 90, 0.18);
    }

    .form button {
      height: 52px;
      padding: 0 22px;
      border: none;
      border-radius: 8px;
      background: var(--teal);
      color: white;
      font-family: 'Barlow', sans-serif;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: background-color 0.12s;
      white-space: nowrap;
    }

    .form button:hover { background: var(--teal-hover); }
    .form button:disabled { opacity: 0.6; cursor: not-allowed; }

    .form-note {
      font-size: 13px;
      color: var(--gray-muted);
      min-height: 1.5em;
    }

    footer {
      padding-top: 2.5rem;
      font-size: 14px;
      color: var(--gray-muted);
    }

    footer a {
      color: inherit;
      text-decoration: none;
      border-bottom: 0.5px solid var(--gray-line);
      transition: color 0.12s, border-color 0.12s;
    }

    footer a:hover {
      color: var(--near-black);
      border-bottom-color: var(--near-black);
    }

    /* === Mobile (≤480px): primary surface — sized for arms-length reading === */
    @media (max-width: 480px) {
      body { font-size: 17px; line-height: 1.6; }
      .page { padding: 1.5rem 1.25rem 1.5rem; }
      header { padding-bottom: 2rem; }
      h1 {
        font-size: 32px;
        line-height: 1.12;
        max-width: none;
        margin-bottom: 1.125rem;
      }
      .lede { font-size: 18px; line-height: 1.5; }
      .meta { font-size: 15px; margin-bottom: 1.75rem; }
      .hero { display: none; }
      .form { flex-direction: column; gap: 10px; }
      .form input[type="email"], .form button { width: 100%; height: 54px; }
      .form button { font-size: 16px; }
      footer { padding-top: 2rem; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="lockup" aria-label="Outlog">
        <svg width="36" height="36" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">

          <path d="M 6 40 C 14 36, 24 36, 32 40 C 40 44, 50 44, 58 40" fill="none" stroke="#0A6E5A" stroke-width="4" stroke-linecap="round" />
          <path d="M 6 48 C 14 44, 24 44, 32 48 C 40 52, 50 52, 58 48" fill="none" stroke="#0A6E5A" stroke-width="3" stroke-linecap="round" />
        </svg>
        <span class="wordmark">Outlog</span>
      </div>
    </header>

    <main>
      <h1>The day they remember.<br>The work you don't have to.</h1>

      <p class="lede">Outlog handles the booking, the schedule, the payments, and the follow up. You handle the water.</p>

      <p class="meta">Built with guides in Colorado, Montana, New Mexico, Utah, and Wyoming.</p>

      <figure class="hero" aria-hidden="true">
        <img src="./hero.jpg" alt="" loading="eager" />
      </figure>

      <div class="label">Early access &mdash; 10 guides this season</div>

  </div>
</body>
</html>
