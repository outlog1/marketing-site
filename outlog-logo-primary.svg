<svg width="220" height="64" viewBox="0 0 220 64" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Outlog logo — primary</title>
  <desc>Outlog pin mark in teal with Barlow wordmark in near-black on stone</desc>
  <rect width="220" height="64" rx="10" fill="#F0EDE6"/>
  <g transform="translate(16, 14)">
    <circle cx="18" cy="18" r="14" fill="none" stroke="#0A6E5A" stroke-width="3.5"/>
    <line x1="18" y1="4" x2="18" y2="10" stroke="#0A6E5A" stroke-width="3.5" stroke-linecap="round"/>
  </g>
  <text x="56" y="41" font-family="'Barlow','Arial Narrow',Arial,sans-serif" font-size="26" font-weight="600" fill="#1A1A18" letter-spacing="0.02em">Outlog</text>
</svg>
